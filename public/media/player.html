<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #videoPlayer {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background-color: #000;
        }

        #loadingIndicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            text-align: center;
            z-index: 10;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #errorMessage {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 0, 0, 0.8);
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            display: none;
            z-index: 20;
        }

        #playlistInfo {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 15;
        }
    </style>
</head>

<body>
    <div id="loadingIndicator">
        <div class="spinner"></div>
        <div>Cargando video...</div>
    </div>

    <div id="errorMessage"></div>
    <div id="playlistInfo"></div>

    <video id="videoPlayer" autoplay></video>

    <!-- Socket.IO for real-time communication -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Configuration
        const CONFIG = {
            baseUrl: window.location.origin,
            mediaPath: '/media/videos/'
        };

        // State
        let playlist = [];
        let currentIndex = 0;
        let loopMode = false;
        let retryCount = 0;
        const MAX_RETRIES = 3;

        // DOM Elements
        const video = document.getElementById('videoPlayer');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMessage = document.getElementById('errorMessage');
        const playlistInfo = document.getElementById('playlistInfo');

        // WebSocket for real-time communication
        let socket = null;
        let screenId = null;
        let lastProgressUpdate = 0;
        const PROGRESS_UPDATE_INTERVAL = 2000; // Update every 2 seconds

        // Initialize WebSocket connection
        function initWebSocket() {
            const params = new URLSearchParams(window.location.search);
            screenId = params.get('screenId');

            if (!screenId) {
                console.warn('⚠️ No screenId provided, WebSocket disabled');
                return;
            }

            try {
                socket = io();

                socket.on('connect', () => {
                    console.log('🔌 WebSocket connected');
                    socket.emit('player:join', parseInt(screenId));

                    // Initialize server state explicitly
                    socket.emit('player:init', {
                        screenId: parseInt(screenId),
                        playlist,
                        loopMode
                    });

                    // Send initial state
                    broadcastState();
                });

                socket.on('disconnect', () => {
                    console.log('❌ WebSocket disconnected');
                });

                // Listen for commands from viewer
                socket.on('player:command', (cmd) => {
                    console.log('🎮 Command received:', cmd.action);
                    handleRemoteCommand(cmd);
                });

                console.log('✅ WebSocket initialized for screen', screenId);
            } catch (error) {
                console.error('❌ WebSocket initialization failed:', error);
            }
        }

        // Handle remote commands
        function handleRemoteCommand(cmd) {
            switch (cmd.action) {
                case 'play':
                    video.play();
                    break;
                case 'pause':
                    video.pause();
                    break;
                case 'seek':
                    video.currentTime = cmd.value;
                    break;
                case 'playIndex':
                    loadVideo(cmd.value);
                    break;
                case 'setLoop':
                    loopMode = cmd.value;
                    video.loop = loopMode && playlist.length === 1;
                    break;
                case 'setVolume':
                    video.volume = cmd.value;
                    break;
                case 'next':
                    playNext();
                    break;
                case 'previous':
                    if (currentIndex > 0) {
                        loadVideo(currentIndex - 1);
                    }
                    break;
                case 'setPlaylist':
                    console.log('📋 Nueva playlist recibida:', cmd.value.playlist);
                    playlist = cmd.value.playlist;
                    loopMode = cmd.value.loop;
                    currentIndex = 0;
                    loadVideo(0);
                    break;
            }
        }

        // Broadcast player state
        function broadcastState() {
            if (!socket || !screenId) return;

            const state = {
                screenId: parseInt(screenId),
                currentVideo: playlist[currentIndex] || '',
                currentTime: video.currentTime || 0,
                duration: video.duration || 0,
                paused: video.paused,
                playlist: playlist,
                currentIndex: currentIndex,
                loopMode: loopMode,
                volume: video.volume
            };

            socket.emit('player:state', state);
        }

        // Broadcast progress (throttled)
        function broadcastProgress() {
            if (!socket || !screenId) return;

            const now = Date.now();
            if (now - lastProgressUpdate < PROGRESS_UPDATE_INTERVAL) return;

            lastProgressUpdate = now;
            socket.emit('player:progress', {
                screenId: parseInt(screenId),
                currentTime: video.currentTime,
                duration: video.duration
            });
        }

        // Broadcast video change
        function broadcastVideoChange() {
            if (!socket || !screenId) return;

            socket.emit('player:videoChange', {
                screenId: parseInt(screenId),
                currentVideo: playlist[currentIndex],
                currentIndex: currentIndex
            });
        }

        // Parse URL parameters
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            screenId = params.get('screenId');
            const playlistParam = params.get('playlist');
            const loopParam = params.get('loop');

            if (!playlistParam) {
                if (screenId) {
                    console.log('ℹ️ Modo espera: No hay playlist inicial, esperando comandos...');
                    return true;
                }
                showError('No se especificó ningún video en la playlist ni ID de pantalla');
                return false;
            }

            playlist = playlistParam.split(',').map(v => v.trim()).filter(v => v);
            loopMode = loopParam === 'true';

            console.log('📋 Playlist:', playlist);
            console.log('🔄 Loop mode:', loopMode);

            return playlist.length > 0;
        }

        // Show error message
        function showError(message) {
            console.error('❌ Error:', message);
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            loadingIndicator.style.display = 'none';

            // Don't hide error automatically if it's critical
            if (!message.includes('URL invalidos')) {
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 5000);
            }
        }

        // Update playlist info display
        function updatePlaylistInfo() {
            if (playlist && playlist.length > 1) {
                playlistInfo.textContent = `Video ${currentIndex + 1} de ${playlist.length}${loopMode ? ' (Loop)' : ''}`;
                playlistInfo.style.display = 'block';

                setTimeout(() => {
                    playlistInfo.style.display = 'none';
                }, 3000);
            }
        }

        // Load video by index
        function loadVideo(index) {
            if (!playlist || playlist.length === 0) {
                console.log('⚠️ Playlist vacia, esperando...');
                return;
            }
            if (index < 0 || index >= playlist.length) {
                console.error('❌ Índice de video inválido:', index);
                return;
            }

            currentIndex = index;
            const videoFile = playlist[currentIndex];
            const videoUrl = `${CONFIG.baseUrl}${CONFIG.mediaPath}${encodeURIComponent(videoFile)}`;

            console.log(`📹 Cargando video ${currentIndex + 1}/${playlist.length}: ${videoFile}`);

            loadingIndicator.innerHTML = '<div class="spinner"></div><div>Cargando video...</div>';
            loadingIndicator.style.display = 'block';
            video.src = videoUrl;
            video.load();

            // Force play after load (needed for playlist continuity)
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.warn('Autoplay prevented or interrupted:', error);
                });
            }

            updatePlaylistInfo();
        }

        // ... playNext ...

        // ... event handlers ...

        // Initialize player
        function init() {
            console.log('🎬 Inicializando Smart Video Player');

            if (!getUrlParams()) {
                showError('Parámetros de URL inválidos');
                return;
            }

            // Set loop attribute if single video loop mode
            if (loopMode && playlist.length === 1) {
                video.loop = true;
                console.log('🔄 Modo loop activado para video único');
            }

            // Initialize WebSocket
            initWebSocket();

            // Add video event listeners for WebSocket broadcasting
            video.addEventListener('waiting', () => {
                console.log('⏳ Buffering/Waiting...');
                loadingIndicator.innerHTML = '<div class="spinner"></div><div>Cargando...</div>';
                loadingIndicator.style.display = 'block';
            });

            video.addEventListener('loadeddata', () => {
                loadingIndicator.style.display = 'none';
            });

            video.addEventListener('play', () => {
                console.log('▶️ Video playing');
                loadingIndicator.style.display = 'none';
                broadcastState();
            });

            video.addEventListener('pause', () => {
                console.log('⏸️ Video paused');
                broadcastState();
            });

            video.addEventListener('timeupdate', () => {
                if (loadingIndicator.style.display !== 'none') {
                    loadingIndicator.style.display = 'none';
                }
                broadcastProgress();
            });

            video.addEventListener('loadedmetadata', () => {
                console.log('📊 Metadata loaded');
                broadcastState();
            });

            video.addEventListener('ended', () => {
                console.log('⏹️ Video ended');
                broadcastState();
                playNext();
            });

            video.addEventListener('volumechange', () => {
                broadcastState();
            });

            // Start playing first video IF playlist exists
            if (playlist.length > 0) {
                loadVideo(0);
            } else {
                loadingIndicator.innerHTML = '<div class="spinner"></div><div>Esperando contenido...</div>';
                loadingIndicator.style.display = 'block';
            }
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

</html>
